<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Influencer Gear</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header area starts here -->
    <header>
        <!-- nav area starts here -->
        <nav class="navbar">
            <!-- logo area -->
            <h3 class="logo">Influencer products</h3>
            
            <!-- menu area -->
            <div class="menu-area">
                <ul>
                    <li>
                        <a href="#">Home</a>
                    </li>
                    <li>
                        <a href="#">Products</a>
                    </li>
                    <li>
                        <a href="#">Sign Up</a>
                    </li>
                    <li>
                        <a href="#">Log In</a>
                    </li>
                    <li>
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </li>
                    <li>
                        <i class="fa-solid fa-cart-shopping"></i>
                    </li>
                </ul>
            </div>
        </nav>
        <!-- nav area ends here -->

        <!-- banner area starts here -->
        <section>
            <!-- banner text -->
            <div class="banner-text">
                <h2 class="banner-title">Start your Journey as 
                    Influencer</h2>
                <p class="banner-description">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sem vestibulum sed scelerisque eros. Lectus faucibus.</p>
                <button>Preebook now 
                    <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>

            <!-- Banner image -->
            <div class="banner-img">
                <img src="images/main-camera.png" alt="banner-img">
            </div>
        </section>
        <!-- banner area starts here -->
    </header>
    <!-- Header area ends here -->

    <!-- font-awesome cdn link added -->
    <script src="https://kit.fontawesome.com/73dcb47781.js" crossorigin="anonymous"></script>
</body>
</html>
